# /etc/nginx/sites-available/proapi.profirmo.com
# Reverse proxy for the Profirmo backend running on 127.0.0.1:5001.
# certbot --nginx will REWRITE this file to add the TLS listener and a
# 301 redirect from :80 — keep the server_name correct and certbot does
# the rest.

# Body limit needs to fit the largest file upload (profile photos +
# documents up to ~20 MB). Bump if you change the upload service cap.
client_max_body_size 25M;

# Cap response time for slow backend operations (defaults are fine for
# most reads; long-running admin reports can be moved to a job queue).
proxy_read_timeout 90s;
proxy_send_timeout 90s;

server {
    listen 80;
    listen [::]:80;
    server_name proapi.profirmo.com;

    # Health-check passthrough without logging — the EC2 / Route53
    # health-checker spams this; keep it out of the access log.
    location = /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:5001/api/health;
        proxy_http_version 1.1;
    }

    # Everything else goes to the Node process.
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        # Pass real client metadata through to Express so audit logs +
        # rate limits see the actual IP, not 127.0.0.1.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Don't buffer SSE / long responses (notification streams, AI
        # streaming responses).
        proxy_buffering off;
    }

    # Security headers (also injected by Helmet on the Express side; we
    # repeat the cheap ones here so they apply to every response,
    # including nginx error pages).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
